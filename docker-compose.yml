services:
  # PostgreSQL Databases
  auth_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  notification_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notification_user
      POSTGRES_PASSWORD: notification_password
      POSTGRES_DB: notification_db
    ports:
      - "5435:5432" # Port 5435 agar tidak bentrok dengan DB lain
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Mail Database
  mail_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mail_user
      POSTGRES_PASSWORD: mail_password
      POSTGRES_DB: mail_db
    ports:
      - "5435:5432"
    volumes:
      - mail_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mail_user -d mail_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Mail Service
  mail_service:
    build:
      context: ./services/mail-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://mail_user:mail_password@mail_db:5432/mail_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      MAIL_SERVICE_PORT: 8004
    ports:
      - "8004:8004"
    depends_on:
      mail_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # Auth Service
  auth_service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    environment:
      AUTH_DB_URL: postgresql://auth_user:auth_password@auth_db:5432/auth_db
      JWT_SECRET: your-secret-key-change-in-production
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    ports:
      - "8001:8001"
    depends_on:
      auth_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # API Gateway
  api_gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    environment:
      AUTH_SERVICE_URL: http://auth_service:8001
      MAIL_SERVICE_URL: http://mail_service:8004
      JWT_SECRET: your-secret-key-change-in-production
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:

  # Prometheus
  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
    ports:
      - "9090:9090"

  # Grafana
  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  auth_db_data:
  mail_db_data:
  notification_db_data:
  rabbitmq_data:

networks:
  default:
    name: micromail_network
